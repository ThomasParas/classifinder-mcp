[project]
name = "classifinder-mcp"
version = "0.1.0"
description = "MCP server for ClassiFinder — secret scanning tools for AI agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "classifinder>=0.1.2",
    "mcp>=1.0.0",
]

[project.scripts]
classifinder-mcp = "classifinder_mcp.server:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/classifinder_mcp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
